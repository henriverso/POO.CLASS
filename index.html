<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro</title>
    <script src="script.js"></script>
</head>
    <body>
        <h1>Parquímetro</h1>

        <h3>Saldo: R$ 0,00.</h3>
        <p>Insira o crédito que deseja adicionar.</p>
        <input type="number" id="saldo" min="1,00" placeholder="Mínimo 1,00.">
        <p><button>Adicionar</button></p>

        <button class="" id="">
            <h2>Plano Básico</h2>
            <h3>R$1,00</h3>
            <h3>30 minutos</h3>
        </button>

        <button class="" id="">
            <h2>Plano Médio</h2>
            <h3>R$1,75</h3>
            <h3>60 minutos</h3>
        </button>

        <button class="" id="">
            <h2>Plano Grande</h2>
            <h3>R$3,00</h3>
            <h3>120 minutos</h3>
        </button>
        
        <p>Escolha o plano desejado.</p>
        <input type="number" id="valor" min="1,00" placeholder="Insira o valor do plano.">
        <p><button>Escolher plano</button></p>

</body>
</html>
