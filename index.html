<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro</title>
</head>
    <body>
            <h1>Parquímetro</h1>

<!--inserir o saldo-->
        <div id="adicionarSaldo" class="adicionarSaldo">

            <h3 id="saldo">Saldo: R$ 0,00.</h3>
            <p>Insira o crédito que deseja adicionar.</p>
            <input type="number" id="iptSaldo" min="1.00" placeholder="Mínimo R$ 1,00.">
            <p><button class="adicionar" id="adicionarSaldoBtn" onclick="adicionarSaldo()">Adicionar</button> </p>
        
        </div>

<!-- Planos -->
        <div id="btnPlano" class="btnPlano">

            <button>
               <h3>Plano Básico</h3>
               <h4>R$1,00</h4>
               <h4>30 minutos</h4>
            </button>

            <button>
               <h3>Plano Médio</h3>
               <h4>R$1,75</h4>
                <h4>60 minutos</h4>
            </button>

         <button>
                <h3>Plano Cheio</h3>
                <h4>R$3,00</h4>
                <h4>120 minutos</h4>
            </button>

        </div>

<!--Escolha do plano-->
        <div id="selecionarPlano" class="selecionarPlano">

        <p>Escolha o plano desejado.</p>
        <input type="number" id="iptPlano" min="1,00" placeholder="Insira o valor do plano.">
        <p><button class="calcular" id="escolherPlanoBtn">Escolher plano</button></p>

        </div>
           <script src="script.js"></script> 
</body>
</html>
